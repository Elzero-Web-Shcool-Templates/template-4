<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | T4</title>
    <!-- Font Awesome Library -->
    <link rel="stylesheet" href="style/all.min.css">

    <!-- Framework CSS Files -->
    <link rel="stylesheet" href="style/framework/box.css">
    <link rel="stylesheet" href="style/framework/padding-and-margin.css">
    <link rel="stylesheet" href="style/framework/color.css">
    <link rel="stylesheet" href="style/framework/position.css">
    <link rel="stylesheet" href="style/framework/font.css">
    <link rel="stylesheet" href="style/framework/list.css">
    
    <!-- Components CSS Files -->
    <link rel="stylesheet" href="style/components/between-flex.css">
    
    <!-- Sections CSS Files -->
    <link rel="stylesheet" href="style/sections/sidebar.css">
    <link rel="stylesheet" href="style/sections/content.css">

    <!-- Main Template CSS File -->
    <link rel="stylesheet" href="style/main.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page d-flex">
        <div class="sidebar bg-white p-20 p-relative">
            <h3 class="p-relative txt-c mt-0">Dashboard</h3>
            <ul class="p-0 list-none">
                <li>
                    <a class="active d-flex align-center fs-14 c-black rad-6 p-10 mb-5" href="index.html">
                        <i class="fa-regular fa-chart-bar fa-fw"></i>
                        <span class="fs-14 ml-10 hide-mobile">Dashboard</span>
                    </a>
                </li>
                <li>
                    <a class="d-flex align-center fs-14 c-black rad-6 p-10 mb-5" href="settings.html">
                        <i class="fa-solid fa-gear fa-fw"></i>
                        <span class="fs-14 ml-10 hide-mobile">Settings</span>
                    </a>
                </li>
                <li>
                    <a class="d-flex align-center fs-14 c-black rad-6 p-10 mb-5" href="profile.html">
                        <i class="fa-regular fa-user fa-fw"></i>
                        <span class="fs-14 ml-10 hide-mobile">Profile</span>
                    </a>
                </li>
                <li>
                    <a class="d-flex align-center fs-14 c-black rad-6 p-10 mb-5" href="projects.html">
                        <i class="fa-solid fa-diagram-project fa-fw"></i>
                        <span class="fs-14 ml-10 hide-mobile">Projects</span>
                    </a>
                </li>
                <li>
                    <a class="d-flex align-center fs-14 c-black rad-6 p-10 mb-5" href="courses.html">
                        <i class="fa-solid fa-graduation-cap fa-fw"></i>
                        <span class="fs-14 ml-10 hide-mobile">Courses</span>
                    </a>
                </li>
                <li>
                    <a class="d-flex align-center fs-14 c-black rad-6 p-10 mb-5" href="friends.html">
                        <i class="fa-solid fa-user-group fa-fw"></i>
                        <span class="fs-14 ml-10 hide-mobile">Friends</span>
                    </a>
                </li>
                <li>
                    <a class="d-flex align-center fs-14 c-black rad-6 p-10 mb-5" href="files.html">
                        <i class="fa-regular fa-file fa-fw"></i>
                        <span class="fs-14 ml-10 hide-mobile">Files</span>
                    </a>
                </li>
                <li>
                    <a class="d-flex align-center fs-14 c-black rad-6 p-10 mb-5" href="plans.html">
                        <i class="fa-regular fa-credit-card fa-fw"></i>
                        <span class="fs-14 ml-10 hide-mobile">Plans</span>
                    </a>
                </li>
            </ul>
        </div>
        <div class="content w-full">
            <!-- Start Head -->
            <div class="head bg-white p-15 between-flex">
                <div class="search p-relative">
                    <!-- <i class="fa-solid fa-magnifying-glass fa-fw c-gray"></i> -->
                    <input class="p-10" type="search" placeholder="Type A Keyword">
                </div>
                <div class="icons d-flex align-center">
                    <span class="notification p-relative"><i class="fa-regular fa-bell fa-lg"></i></span>
                    <img src="images/user.webp" alt="">
                </div>
            </div>
            <!-- End Head -->
        </div>
    </div>
</body>
</html>
